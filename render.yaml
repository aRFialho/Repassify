services:
  - type: web
    name: repassify-web
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build -w packages/core && npm run build -w apps/web
    startCommand: npm run start -w apps/web
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://repassify-api.onrender.com

  - type: web
    name: repassify-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build -w packages/core && npm run build -w packages/db && npm run build -w apps/api
    preDeployCommand: npm run db:migrate
    initialDeployHook: npm run db:seed:admin
    startCommand: npm run start -w apps/api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_DIRECT
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REPASSIFY_ADMIN_EMAIL
        value: admin@repassify.com
      - key: REPASSIFY_ADMIN_PASSWORD
        sync: false
      - key: REPASSIFY_ADMIN_NAME
        value: Admin Master
      - key: WEB_ORIGIN
        value: https://repassify-web.onrender.com

  - type: worker
    name: repassify-ingestion-worker
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build -w packages/core && npm run build -w workers/ingestion
    startCommand: npm run start -w workers/ingestion
    envVars:
      - key: DATABASE_URL
        sync: false

  - type: worker
    name: repassify-reconciliation-worker
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build -w packages/core && npm run build -w workers/reconciliation
    startCommand: npm run start -w workers/reconciliation
    envVars:
      - key: DATABASE_URL
        sync: false

  - type: cron
    name: repassify-nightly-reconciliation
    runtime: node
    schedule: "0 5 * * *"
    buildCommand: npm install && npm run build -w packages/core && npm run build -w workers/reconciliation
    startCommand: npm run start -w workers/reconciliation -- --mode nightly
    envVars:
      - key: DATABASE_URL
        sync: false
